name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:   # אפשר גם הפעלה ידנית

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Install expo-dev-client (dev build)
        run: npm install expo-dev-client --save

      - name: Prebuild Android (generate native code)
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_GIT_STATUS: 1

      - name: Build Dev APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

      - name: Print debug SHA-1
        run: keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android 2>/dev/null | grep SHA1

      - name: Find and upload APK
        run: find android/app/build/outputs/apk -name "*.apk" | head -5

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartClean-DEV-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
