<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" font-family="Inter, Arial, sans-serif">
  <rect width="390" height="844" rx="0" fill="#F8F9FA"/>

  <!-- Header -->
  <rect width="390" height="96" fill="#1E3A5F"/>
  <circle cx="40" cy="58" r="18" fill="#2B4A6F"/>
  <text x="195" y="54" fill="#FFFFFF" font-size="18" font-weight="900" text-anchor="middle">A&amp;M Clean</text>
  <text x="195" y="74" fill="#BFD7EF" font-size="12" text-anchor="middle">ניקיון מקצועי. בלחיצה אחת.</text>
  <circle cx="350" cy="58" r="18" fill="#2B4A6F"/>

  <!-- Search bar -->
  <rect x="16" y="112" width="358" height="44" rx="22" fill="#FFFFFF" stroke="#BFD7EF"/>
  <text x="356" y="139" fill="#6B7280" font-size="14" text-anchor="end">חיפוש עיר או מנקה…  🔍</text>

  <!-- Region tabs -->
  <rect x="16" y="168" width="70" height="32" rx="16" fill="#185FA5"/>
  <text x="51" y="189" fill="#FFFFFF" font-size="12" font-weight="700" text-anchor="middle">הכל</text>
  <rect x="94" y="168" width="70" height="32" rx="16" fill="#FFFFFF" stroke="#BFD7EF"/>
  <text x="129" y="189" fill="#1F2937" font-size="12" text-anchor="middle">צפון</text>
  <rect x="172" y="168" width="70" height="32" rx="16" fill="#FFFFFF" stroke="#BFD7EF"/>
  <text x="207" y="189" fill="#1F2937" font-size="12" text-anchor="middle">מרכז</text>
  <rect x="250" y="168" width="70" height="32" rx="16" fill="#FFFFFF" stroke="#BFD7EF"/>
  <text x="285" y="189" fill="#1F2937" font-size="12" text-anchor="middle">דרום</text>

  <!-- Map -->
  <rect x="16" y="212" width="358" height="220" rx="16" fill="#DCE7F2"/>
  <circle cx="195" cy="322" r="60" fill="#FF8A00" fill-opacity="0.12" stroke="#FF8A00" stroke-opacity="0.5"/>
  <circle cx="195" cy="322" r="9" fill="#FF8A00" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="140" cy="290" r="6" fill="#185FA5"/>
  <circle cx="250" cy="350" r="6" fill="#185FA5"/>
  <circle cx="230" cy="280" r="6" fill="#185FA5"/>
  <!-- recenter button -->
  <circle cx="46" cy="402" r="20" fill="#FFFFFF" stroke="#BFD7EF"/>
  <text x="46" y="408" font-size="16" text-anchor="middle">📍</text>

  <!-- Cleaner card -->
  <rect x="16" y="448" width="358" height="150" rx="14" fill="#FFFFFF" stroke="#BFD7EF"/>
  <circle cx="330" cy="486" r="22" fill="#EAF2FB"/>
  <text x="330" y="492" font-size="16" text-anchor="middle">🧹</text>
  <text x="356" y="482" fill="#185FA5" font-size="16" font-weight="900" text-anchor="end">קרן</text>
  <text x="356" y="504" fill="#6B7280" font-size="11" text-anchor="end">📍 חריש · ₪90 לשעה</text>
  <!-- service pills -->
  <rect x="244" y="516" width="64" height="22" rx="7" fill="#EAF2FB"/>
  <text x="276" y="531" fill="#185FA5" font-size="10" font-weight="600" text-anchor="middle">לפסח</text>
  <rect x="170" y="516" width="64" height="22" rx="7" fill="#EAF2FB"/>
  <text x="202" y="531" fill="#185FA5" font-size="10" font-weight="600" text-anchor="middle">חלונות</text>
  <!-- rating -->
  <text x="356" y="560" fill="#F59E0B" font-size="13" text-anchor="end">★★★★★  4.9 (142)</text>
  <!-- action buttons -->
  <rect x="24" y="568" width="150" height="20" rx="10" fill="#185FA5"/>
  <text x="99" y="582" fill="#FFFFFF" font-size="11" font-weight="800" text-anchor="middle">הזמן</text>
  <rect x="182" y="568" width="90" height="20" rx="10" fill="#EAF2FB"/>
  <text x="227" y="582" fill="#185FA5" font-size="11" text-anchor="middle">פרופיל</text>

  <!-- Urgent FAB -->
  <rect x="16" y="616" width="358" height="48" rx="14" fill="#DC2626"/>
  <text x="195" y="646" fill="#FFFFFF" font-size="16" font-weight="900" text-anchor="middle">🚨  ניקיון דחוף — היום</text>

  <!-- Bottom tab bar -->
  <rect x="0" y="780" width="390" height="64" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="80"  y="816" font-size="11" fill="#6B7280" text-anchor="middle">⚙️ הגדרות</text>
  <text x="195" y="816" font-size="11" fill="#6B7280" text-anchor="middle">💬 הודעות</text>
  <text x="320" y="816" font-size="11" fill="#185FA5" font-weight="800" text-anchor="middle">🏠 בית</text>
</svg>
